services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    # Port 5432 removed to lock down database access from the outside world
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node_backend
    restart: unless-stopped
    ports:
      - "80:3000" # Maps standard web port 80 to your Node port 3000
    env_file:
      - .env # Securely injects your DATABASE_URL and JWT_SECRET
    command: sh -c "npx prisma generate && npx prisma migrate deploy && node dist/index.js"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data: